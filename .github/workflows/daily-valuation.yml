name: 基金估值引擎

on:
  schedule:
    # 这里的 cron 必须严格遵守 YAML 格式
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-valuation:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout
      uses: actions/checkout@v4
      
    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: install
      run: pip install requests
      
    - name: run script
      env:
        WEBHOOK: ${{ secrets.WEBHOOK }}
      run: python daily_valuation.py
